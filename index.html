<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect4 Live Analysis</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=clash-display@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0:#07111d;
      --bg1:#0b1a2b;
      --bg2:#13283f;
      --glass:rgba(255,255,255,.08);
      --glass2:rgba(255,255,255,.05);
      --line:rgba(255,255,255,.12);
      --text:#eef5ff;
      --muted:#a8b7c9;
      --accent:#67d5ff;
      --green:#6ee7a8;
      --red:#ff718a;
      --yellow:#ffd34d;
      --blue:#2d8cff;
      --boardA:#d8e8f4;
      --boardB:#b7cde2;
      --shadow:0 18px 48px rgba(0,0,0,.35);
      --radius:18px;
      --radius-sm:12px;
      --transition:180ms cubic-bezier(.16,1,.3,1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Satoshi',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(103,213,255,.18), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(103,213,255,.12), transparent 25%),
        linear-gradient(145deg, var(--bg2), var(--bg0) 60%);
      min-height:100dvh;
      overflow:hidden;
    }
    .app{
      width:100%;
      max-width:480px;
      height:100dvh;
      margin:0 auto;
      position:relative;
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      backdrop-filter: blur(8px);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .topbar{
      display:grid;
      grid-template-columns:44px 1fr 44px 44px;
      align-items:center;
      padding:10px 12px 8px;
      gap:8px;
      background:linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,0));
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .icon-btn{
      width:36px;height:36px;border-radius:12px;border:1px solid var(--line);
      background:var(--glass2);color:var(--text);display:grid;place-items:center;
      font-size:18px
    }
    .title{font-weight:700;text-align:center;font-size:18px;letter-spacing:.02em}

    .engine-strip{
      padding:8px 12px 10px;
      display:grid;gap:6px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .scoreline{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}
    .scoreline strong{color:var(--text);font-size:16px}
    .eval-wrap{
      display:grid;grid-template-columns:54px 1fr;gap:8px;align-items:stretch;
    }
    .eval-box{
      border-radius:12px;background:rgba(0,0,0,.22);border:1px solid var(--line);
      padding:8px 6px;text-align:center;display:grid;place-items:center;
      font-weight:700;font-size:14px;color:var(--text)
    }
    .pv-box{
      border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--line);
      padding:8px 10px;font-size:12px;line-height:1.45;color:#dbe7f4;overflow:hidden;
      white-space:nowrap;text-overflow:ellipsis
    }
    .depth-row{display:flex;align-items:center;gap:8px}
    .depth-label{font-size:12px;color:var(--muted);min-width:46px}
    .depth-bar{
      flex:1;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.06)
    }
    .depth-fill{
      height:100%;width:0%;background:linear-gradient(90deg, var(--accent), #8ff5ff);transition:width .28s ease
    }
    .depth-value{font-size:12px;color:var(--text);min-width:58px;text-align:right}

    .board-area{
      position:relative;
      padding:12px 14px 8px;
      display:grid;
      place-items:center;
      min-height:0;
    }
    .board-shell{
      width:min(100%, 390px);
      aspect-ratio:7/6;
      border-radius:20px;
      padding:10px;
      background:linear-gradient(180deg, #1759c9, #0f419d);
      box-shadow:0 10px 28px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.12);
      position:relative;
    }
    .board{
      width:100%;height:100%;display:grid;grid-template-columns:repeat(7,1fr);gap:8px;
    }
    .cell{
      background:#08224e;border-radius:50%;position:relative;overflow:hidden;
      box-shadow:inset 0 2px 4px rgba(255,255,255,.08), inset 0 -4px 8px rgba(0,0,0,.35);
    }
    .disc{
      position:absolute;inset:7%;border-radius:50%;background:transparent;
      transition:transform var(--transition), background var(--transition), box-shadow var(--transition)
    }
    .disc.p1{background:linear-gradient(180deg,#ffe893,#ffd34d 65%,#d6a91c);box-shadow:0 2px 10px rgba(255,211,77,.35)}
    .disc.p2{background:linear-gradient(180deg,#ff9aaa,#ff718a 65%,#ce405c);box-shadow:0 2px 10px rgba(255,113,138,.35)}
    .ghost-col{
      position:absolute;top:10px;bottom:10px;width:calc((100% - 20px - 48px)/7 + 6px);
      border-radius:14px;pointer-events:none;opacity:0;transform:translateX(0);
      background:linear-gradient(180deg, rgba(103,213,255,.22), rgba(103,213,255,.06));
      transition:opacity var(--transition), transform var(--transition)
    }
    .ghost-col.show{opacity:1}
    .best-arrow{
      position:absolute;right:-6px;top:50%;transform:translateY(-50%);
      color:var(--accent);font-size:34px;text-shadow:0 0 18px rgba(103,213,255,.45);
      transition:top .22s ease, opacity .22s ease;opacity:0
    }
    .best-arrow.show{opacity:1}

    .opening{
      width:100%;padding:0 16px 10px;color:#dce8f7;font-size:13px;
      text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }

    .move-sheet{
      min-height:0;
      border-top-left-radius:26px;border-top-right-radius:26px;
      background:linear-gradient(180deg, rgba(8,14,24,.96), rgba(5,10,18,.98));
      border-top:1px solid rgba(255,255,255,.08);
      padding:12px 14px 92px;
      overflow:auto;
    }
    .sheet-grab{
      width:46px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);
      margin:0 auto 12px;
    }
    .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .sheet-head h3{font-size:15px}
    .sheet-head .live{font-size:11px;color:var(--green);letter-spacing:.08em;text-transform:uppercase}
    .moves-grid{display:grid;gap:8px}
    .move-row{
      display:grid;grid-template-columns:28px 1fr 1fr 44px;gap:8px;align-items:start;
      font-size:13px;color:#d8e4f1;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)
    }
    .move-no{color:var(--muted)}
    .move-cell{line-height:1.35}
    .move-cell small{display:block;color:#92a6bc;font-size:11px;margin-top:2px}
    .move-eval{text-align:right;color:#c8d8ea}
    .current{background:linear-gradient(90deg, rgba(103,213,255,.18), transparent 78%);border-radius:10px;padding:6px}

    .bottom-nav{
      position:absolute;left:0;right:0;bottom:0;
      display:grid;grid-template-columns:1fr 1fr 68px 1fr 1fr;
      align-items:end;padding:10px 10px 12px;
      background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.38) 25%, rgba(0,0,0,.68));
      backdrop-filter: blur(6px);
    }
    .nav-item{
      display:grid;place-items:center;gap:4px;color:#c6d5e6;font-size:11px
    }
    .nav-icon{
      width:34px;height:34px;border-radius:12px;border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.05);display:grid;place-items:center;font-size:17px
    }
    .play-btn{
      width:58px;height:58px;border-radius:18px;background:linear-gradient(180deg,#b8ff67,#8be23f);
      color:#163109;border:none;font-size:24px;box-shadow:0 10px 24px rgba(139,226,63,.32)
    }
    .tiny{font-size:11px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="icon-btn">←</button>
      <div class="title">Analysis</div>
      <button class="icon-btn">⚙</button>
      <button class="icon-btn">☰</button>
    </header>

    <section class="engine-strip">
      <div class="scoreline">
        <span>Engine evaluation</span>
        <strong id="scoreText">+0.24</strong>
      </div>
      <div class="eval-wrap">
        <div class="eval-box" id="miniEval">+0.24</div>
        <div class="pv-box" id="pvText">4 3 4 2 5 2 3 1 4 5 3 ...</div>
      </div>
      <div class="depth-row">
        <div class="depth-label">Depth</div>
        <div class="depth-bar"><div class="depth-fill" id="depthFill"></div></div>
        <div class="depth-value" id="depthValue">d1 / 18</div>
      </div>
    </section>

    <section class="board-area">
      <div class="board-shell" id="boardShell">
        <div class="ghost-col" id="ghostCol"></div>
        <div class="board" id="board"></div>
        <div class="best-arrow" id="bestArrow">➜</div>
      </div>
    </section>

    <div class="opening" id="openingText">Connect-4 Live Analysis • Auto background search • Infinite style depth updates</div>

    <section class="move-sheet">
      <div class="sheet-grab"></div>
      <div class="sheet-head">
        <h3>Move list</h3>
        <div class="live">Live engine</div>
      </div>
      <div class="moves-grid" id="movesGrid"></div>
    </section>

    <nav class="bottom-nav">
      <div class="nav-item"><div class="nav-icon">☷</div><span>Options</span></div>
      <div class="nav-item"><div class="nav-icon">⌕</div><span>Explorer</span></div>
      <div class="nav-item"><button class="play-btn" id="playBtn">★</button></div>
      <div class="nav-item"><div class="nav-icon">←</div><span>Back</span></div>
      <div class="nav-item"><div class="nav-icon">→</div><span>Forward</span></div>
    </nav>
  </div>

  <script>
    const COLS = 7, ROWS = 6, MAX_DEPTH = 18;
    let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    let moves = [3,2,3,4,2,4,3,5,1,3,4,2];
    let turn = 1;
    let currentDepth = 0;
    let evalValue = 0.24;
    let searching = false;
    let bestMove = 3;
    let searchTimer = null;

    const boardEl = document.getElementById('board');
    const movesGrid = document.getElementById('movesGrid');
    const depthFill = document.getElementById('depthFill');
    const depthValue = document.getElementById('depthValue');
    const scoreText = document.getElementById('scoreText');
    const miniEval = document.getElementById('miniEval');
    const pvText = document.getElementById('pvText');
    const ghostCol = document.getElementById('ghostCol');
    const bestArrow = document.getElementById('bestArrow');
    const boardShell = document.getElementById('boardShell');
    const playBtn = document.getElementById('playBtn');

    function dropPiece(col, player) {
      for (let r = 0; r < ROWS; r++) {
        if (board[r][col] === 0) {
          board[r][col] = player;
          return r;
        }
      }
      return -1;
    }

    function resetBoard() {
      board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
      turn = 1;
      for (const m of moves) {
        dropPiece(m, turn);
        turn = turn === 1 ? 2 : 1;
      }
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      for (let r = ROWS - 1; r >= 0; r--) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          const disc = document.createElement('div');
          disc.className = 'disc' + (board[r][c] === 1 ? ' p1' : board[r][c] === 2 ? ' p2' : '');
          cell.appendChild(disc);
          cell.addEventListener('click', () => userMove(c));
          cell.addEventListener('mouseenter', () => showGhost(c));
          cell.addEventListener('mouseleave', () => hideGhost());
          boardEl.appendChild(cell);
        }
      }
      placeBestArrow(bestMove);
    }

    function renderMoves() {
      let html = '';
      for (let i = 0; i < moves.length; i += 2) {
        const moveNo = Math.floor(i / 2) + 1;
        const w = moves[i] ?? '';
        const b = moves[i + 1] ?? '';
        const currentClass = i + 1 >= moves.length ? ' current' : '';
        html += `
          <div class="move-row${currentClass}">
            <div class="move-no">${moveNo}.</div>
            <div class="move-cell">${w}<small>Yellow</small></div>
            <div class="move-cell">${b}<small>Red</small></div>
            <div class="move-eval">${(evalValue + (Math.random() * .3 - .15)).toFixed(2)}</div>
          </div>`;
      }
      movesGrid.innerHTML = html;
    }

    function showGhost(col) {
      const cellW = (boardShell.clientWidth - 20 - 8 * 6) / 7;
      const x = 10 + col * (cellW + 8) - 3;
      ghostCol.style.width = (cellW + 6) + 'px';
      ghostCol.style.transform = `translateX(${x}px)`;
      ghostCol.classList.add('show');
    }

    function hideGhost() {
      ghostCol.classList.remove('show');
    }

    function placeBestArrow(col) {
      const cellW = (boardShell.clientWidth - 20 - 8 * 6) / 7;
      const x = 10 + col * (cellW + 8) + cellW * .5 - 8;
      bestArrow.style.left = x + 'px';
      bestArrow.style.top = '50%';
      bestArrow.classList.add('show');
    }

    function updateEngineUI() {
      const pct = currentDepth / MAX_DEPTH * 100;
      depthFill.style.width = pct + '%';
      depthValue.textContent = `d${currentDepth} / ${MAX_DEPTH}`;
      scoreText.textContent = (evalValue >= 0 ? '+' : '') + evalValue.toFixed(2);
      miniEval.textContent = (evalValue >= 0 ? '+' : '') + evalValue.toFixed(2);
      pvText.textContent = buildPV(bestMove);
      placeBestArrow(bestMove);
      renderMoves();
    }

    function buildPV(first) {
      const seq = [first];
      for (let i = 0; i < 8; i++) seq.push(Math.floor(Math.random() * 7));
      return seq.join(' ') + ' ...';
    }

    function startBackgroundAnalysis() {
      clearInterval(searchTimer);
      searching = true;
      currentDepth = 0;
      bestMove = Math.floor(Math.random() * 7);
      evalValue = (Math.random() * 1.6 - 0.8);
      updateEngineUI();

      searchTimer = setInterval(() => {
        if (currentDepth >= MAX_DEPTH) {
          clearInterval(searchTimer);
          searching = false;
          return;
        }
        currentDepth++;
        evalValue += (Math.random() * .22 - .11);
        evalValue = Math.max(-7.5, Math.min(7.5, evalValue));
        if (Math.random() > 0.58) bestMove = Math.floor(Math.random() * 7);
        updateEngineUI();
      }, 380);
    }

    function userMove(col) {
      if (dropPiece(col, turn) === -1) return;
      moves.push(col);
      turn = turn === 1 ? 2 : 1;
      renderBoard();
      renderMoves();
      startBackgroundAnalysis();
    }

    playBtn.addEventListener('click', () => {
      const randomCol = Math.floor(Math.random() * 7);
      userMove(randomCol);
    });

    window.addEventListener('resize', () => placeBestArrow(bestMove));

    resetBoard();
    renderBoard();
    renderMoves();
    startBackgroundAnalysis();
  </script>
</body>
</html>
