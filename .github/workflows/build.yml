name: Build WASM and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Verify emcc
        run: emcc --version

      - name: Build WASM
        run: |
          mkdir -p docs
          emcc src/bindings.cpp src/engine.cpp -O3 \
            -s WASM=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORTED_FUNCTIONS='["_reset_engine","_set_position_from_moves","_search_bestmove","_search_score","_search_depth","_get_pv_line","_side_to_move"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]' \
            -o docs/engine.js

      - name: Confirm output
        run: |
          echo "Generated files:"
          ls -lh docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
